version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: ucuzabak-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ucuzabak}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ucuzabak}
      POSTGRES_DB: ${POSTGRES_DB:-ucuzabak}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: ucuzabak-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: ucuzabak-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: ucuzabak-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.3
    container_name: ucuzabak-elasticsearch
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data

  api:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    container_name: ucuzabak-api
    depends_on:
      - postgres
      - redis
    environment:
      NODE_ENV: development
      PORT: ${API_PORT:-4000}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-ucuzabak}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ucuzabak}
      POSTGRES_DB: ${POSTGRES_DB:-ucuzabak}
      DATABASE_URL: postgresql://${POSTGRES_USER:-ucuzabak}:${POSTGRES_PASSWORD:-ucuzabak}@postgres:5432/${POSTGRES_DB:-ucuzabak}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "${API_PORT:-4000}:4000"

  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
    container_name: ucuzabak-web
    depends_on:
      - api
    environment:
      NODE_ENV: development
      PORT: ${WEB_PORT:-3000}
      NEXT_PUBLIC_API_BASE_URL: http://localhost:${API_PORT:-4000}/api/v1
    ports:
      - "${WEB_PORT:-3000}:3000"

  worker:
    build:
      context: .
      dockerfile: ./apps/worker/Dockerfile
    container_name: ucuzabak-worker
    depends_on:
      - redis
      - postgres
    environment:
      NODE_ENV: development
      WORKER_NAME: ${WORKER_NAME:-ucuzabak-worker}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-ucuzabak}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ucuzabak}
      POSTGRES_DB: ${POSTGRES_DB:-ucuzabak}
      DATABASE_URL: postgresql://${POSTGRES_USER:-ucuzabak}:${POSTGRES_PASSWORD:-ucuzabak}@postgres:5432/${POSTGRES_DB:-ucuzabak}
      REDIS_HOST: redis
      REDIS_PORT: 6379

volumes:
  postgres_data:
  minio_data:
  es_data:

